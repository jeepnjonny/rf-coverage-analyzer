# RF Coverage Analyzer — Apache configuration fragment
# Designed to be dropped into an existing Apache server alongside other sites.
#
# Install:
#   sudo cp apache.conf /etc/apache2/conf-available/rf-coverage-analyzer.conf
#   sudo a2enconf rf-coverage-analyzer
#   sudo systemctl reload apache2
#
# Remove:
#   sudo a2disconf rf-coverage-analyzer && sudo systemctl reload apache2
#
# Required modules (run once):
#   sudo a2enmod proxy proxy_http alias headers expires

# ── Entry point redirect ──────────────────────────────────────────────────────
# /rf-analyzer (no slash) → canonical URL
RedirectMatch permanent "^/rf-analyzer$" "/rf-analyzer/index.html"

# /rf-analyzer/ and /rf-analyzer/index.html both map to Flask's root route.
# The HTML page loads /static/ and /api/ via absolute paths, so only this
# entry point needs the prefix stripped.
ProxyPassMatch "^/rf-analyzer/(index\.html)?$" "http://127.0.0.1:5000/"

# ── Static assets — served directly by Apache (bypasses Flask) ───────────────
Alias /static/ /srv/rfanalysis/static/
<Directory /srv/rfanalysis/static/>
    Options -Indexes
    AllowOverride None
    Require all granted
</Directory>
<Location "/static/">
    ExpiresActive On
    ExpiresDefault "access plus 1 hour"
    Header set Cache-Control "public, must-revalidate"
</Location>

# ── SSE analysis stream — buffering MUST be disabled ─────────────────────────
# Apache buffers proxy responses by default. flushpackets=on forces each
# SSE chunk through immediately; without it the map never updates mid-analysis.
<Location "/api/analyze">
    ProxyPass        "http://127.0.0.1:5000/api/analyze" flushpackets=on
    ProxyPassReverse "http://127.0.0.1:5000/api/analyze"
    RequestHeader    set X-Forwarded-Proto "http"
</Location>

# ── File upload — raise body size limit to 32 MB ─────────────────────────────
<Location "/api/upload/">
    ProxyPass        "http://127.0.0.1:5000/api/upload/"
    ProxyPassReverse "http://127.0.0.1:5000/api/upload/"
    LimitRequestBody 33554432
</Location>

# ── API — all other endpoints ─────────────────────────────────────────────────
<Location "/api/">
    ProxyPass        "http://127.0.0.1:5000/api/"
    ProxyPassReverse "http://127.0.0.1:5000/api/"
</Location>
