server {
    listen 80;
    server_name _;

    # ── Entry point redirects ────────────────────────────────────────────────
    # Bare root and /rf-analyzer both redirect to the canonical URL.
    location = / {
        return 301 /rf-analyzer/index.html;
    }
    location = /rf-analyzer {
        return 301 /rf-analyzer/index.html;
    }

    # Canonical app entry point — proxy to Flask root route.
    # index.html uses absolute paths (/static/, /api/) so only this
    # location needs the prefix; everything else stays at /.
    location = /rf-analyzer/ {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location = /rf-analyzer/index.html {
        proxy_pass         http://127.0.0.1:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # ── Static assets — served directly by nginx (bypasses Flask) ───────────
    location /static/ {
        alias   /srv/rfanalysis/static/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # ── API — SSE analysis stream (must NOT be buffered) ────────────────────
    location /api/analyze {
        proxy_pass                http://127.0.0.1:5000;
        proxy_http_version        1.1;
        proxy_set_header          Host              $host;
        proxy_set_header          X-Real-IP         $remote_addr;
        proxy_set_header          X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        600s;
        add_header                X-Accel-Buffering no;
        chunked_transfer_encoding on;
    }

    # ── API — file upload (allow 32 MB body) ────────────────────────────────
    location /api/upload/ {
        proxy_pass           http://127.0.0.1:5000;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        client_max_body_size 32m;
        proxy_read_timeout   60s;
    }

    # ── API — all other endpoints ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
