# RF Coverage Analyzer -- nginx location snippet
# Drop into an existing server{} block with:
#   include snippets/rf-coverage-analyzer.conf;
#
# The setup.sh script does this automatically.
# Required nginx modules: proxy, proxy_http (enabled by default on Debian/Ubuntu)

# ── Entry point ──────────────────────────────────────────────────────────────
# /rf-analyzer (no trailing slash) → canonical URL
location = /rf-analyzer {
    return 301 /rf-analyzer/index.html;
}

# /rf-analyzer/ and /rf-analyzer/index.html both proxy to Flask's root route.
# The page loads /static/ and /api/ via absolute paths so only this
# entry point needs the prefix stripped.
location = /rf-analyzer/ {
    proxy_pass         http://127.0.0.1:5000/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
}
location = /rf-analyzer/index.html {
    proxy_pass         http://127.0.0.1:5000/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
}

# ── Static assets -- served directly by nginx (bypasses Flask) ───────────────
location /static/ {
    alias   /srv/rfanalysis/static/;
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
    access_log off;
}

# ── API -- SSE analysis stream (must NOT be buffered) ────────────────────────
location /api/analyze {
    proxy_pass                http://127.0.0.1:5000;
    proxy_http_version        1.1;
    proxy_set_header          Host              $host;
    proxy_set_header          X-Real-IP         $remote_addr;
    proxy_set_header          X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_buffering           off;
    proxy_cache               off;
    proxy_read_timeout        600s;
    add_header                X-Accel-Buffering no;
    chunked_transfer_encoding on;
}

# ── API -- file upload (allow 32 MB body) ────────────────────────────────────
location /api/upload/ {
    proxy_pass           http://127.0.0.1:5000;
    proxy_set_header     Host              $host;
    proxy_set_header     X-Real-IP         $remote_addr;
    proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
    client_max_body_size 32m;
    proxy_read_timeout   60s;
}

# ── API -- save/load analyses (body can be 10-30 MB for long tracks) ─────────
location /api/analyses {
    proxy_pass           http://127.0.0.1:5000;
    proxy_set_header     Host              $host;
    proxy_set_header     X-Real-IP         $remote_addr;
    proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
    client_max_body_size 64m;
    proxy_read_timeout   30s;
}

# ── API -- all other endpoints ────────────────────────────────────────────────
location /api/ {
    proxy_pass         http://127.0.0.1:5000;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
}
